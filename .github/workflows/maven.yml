# This workflow builds the backend Maven project and runs its tests.
# The sql module runs integration tests against PostgreSQL via Testcontainers,
# which relies on the Docker engine available on GitHub-hosted Ubuntu runners.

name: Java/Kotlin CI with Maven

on:
  push:
    branches: [ "master" ]
    paths:
      - 'backend/**'
      - '.github/workflows/maven.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'backend/**'
      - '.github/workflows/maven.yml'

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build and test with Maven
      working-directory: ./backend
      run: mvn -B -ntp verify
    - name: Upload test reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: backend/**/target/surefire-reports/
        if-no-files-found: ignore
